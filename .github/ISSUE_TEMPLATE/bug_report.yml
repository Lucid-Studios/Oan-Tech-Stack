name: Project Sanctuary public concern
description: Report a Project Sanctuary public release-page, boundary, or repository hygiene concern.
title: "[Public]: "
labels:
  - repository
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What Project Sanctuary wording, repository metadata, or boundary language appears unclear, incorrect, or unsafe?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Public surface
      description: Choose the public surface that best matches the concern.
      options:
        - Project Sanctuary release page
        - Contribution process
        - Issue or pull request template
        - Release-boundary wording
        - Responsible disclosure routing
        - Repository hygiene
        - Other public surface
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link to the public file or section. Do not paste sensitive excerpts.
  - type: textarea
    id: suggested_change
    attributes:
      label: Suggested public-safe correction
      description: Propose safer wording if you have it. Keep the suggestion non-executable and public-release safe.
  - type: checkboxes
    id: hygiene
    attributes:
      label: Public intake hygiene
      options:
        - label: I have not included private corpus paths, credentials, tokens, logs, local absolute paths, runtime payloads, model payloads, or sensitive operator material.
          required: true
        - label: I am not requesting build, install, test, release, deployment, or reconstruction instructions.
          required: true
