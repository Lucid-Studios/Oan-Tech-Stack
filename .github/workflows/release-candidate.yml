name: Governed Release Candidate

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - "codex/**"

permissions:
  contents: read

jobs:
  release-candidate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show SDK info
        shell: pwsh
        run: dotnet --info

      - name: Run governed release-candidate conveyor
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tools\Invoke-Release-Candidate.ps1 -Configuration Release

      - name: Upload release-candidate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-evidence
          path: |
            .audit/runs/release-candidates
            .audit/runs/release-candidate-build-audits
